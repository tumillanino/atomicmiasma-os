modules:
    - type: containerfile
      snippets:
        - COPY --from=ghcr.io/ublue-os/akmods:main-43 /rpms /tmp/rpms
        - COPY --from=ghcr.io/ublue-os/akmods:main-43 /kernel-rpms /tmp/rpms/kernel
        - RUN find /tmp/rpms
        - RUN rpm -q ublue-os-akmods-addons || dnf install -y /tmp/rpms/ublue-os/ublue-os-akmods-addons*.rpm
    - type: script
      scripts:
        - installsignedkernel.sh
        # remove line below once rpm-ostree is fixed
        - pinrpmostree.sh

    - type: dnf
      install:
        install-weak-deps: false
        packages:
          - just
          - powerstat

    - type: dnf
      repos:
        files:
          - https://copr.fedorainfracloud.org/coprs/ublue-os/packages/repo/fedora-%OS_VERSION%/ublue-os-packages-fedora-%OS_VERSION%.repo
      install:
        install-weak-deps: false
        packages:
          - ublue-os-udev-rules
          - ublue-os-update-services
          - ublue-os-signing
          - ublue-os-luks
          - ublue-os-just

    - type: script
      scripts:
        - installandroidudev.sh
        - ensureautoupdates.sh
        - addimageinfo.sh

    - type: dnf
      install:
        install-weak-deps: false
        packages:
        # launcher
          - rofi-wayland
          - wofi
          - zsh
          - openssl
          - openssh
          - 7zip
          - toolbox
          - podman
          - rsync

        # environment
          - fzf
          - tuned-ppd
          - xorg-x11-server-Xwayland
          - headsetcontrol
          - mediainfo
          - polkit
          - xfce-polkit 
          - fprintd-pam
          - xdg-user-dirs
          - dbus-tools
          - dbus-daemon
          - wl-clipboard
          - pavucontrol
          - playerctl
          - qt5-qtwayland
          - qt6-qtwayland
          - vulkan-validation-layers
          - vulkan-tools
          - google-noto-emoji-fonts
          - gnome-disk-utility
          - ddcutil
          - openssl
          - neovim
          - tmux
          - just
          - alsa-firmware
          - p7zip
          - distrobox
          - steam-devices
          - dgop
          - cliphist
          
        # sound
          - wireplumber
          - pipewire
          - pamixer
          - pulseaudio-utils
          - qt6-qtmultimedia

        # networking
          - network-manager-applet
          - NetworkManager-openvpn
          - NetworkManager-openvpn-gnome
          - NetworkManager-openconnect
          - NetworkManager-openconnect-gnome
          - bluez
          - bluez-tools
          - blueman
          - firewall-config

        # file manager
          - thunar
          - thunar-archive-plugin 
          - thunar-volman
          - xarchiver
          - imv
          - p7zip
          - gvfs-mtp
          - gvfs-gphoto2
          - gvfs-smb
          - gvfs-nfs
          - gvfs-fuse
          - gvfs-archive
          - android-tools

        # screenshot
          - slurp
          - grim

        # display
          - wlr-randr
          - wlsunset
          - brightnessctl
          - kanshi
          - quickshell-git
          - cava
          - matugen

        # notifications
          - dunst

        # theme and GUI
          - fontawesome-fonts-all
          - gnome-themes-extra
          - gnome-icon-theme
          - paper-icon-theme
          - breeze-icon-theme 
          - papirus-icon-theme
      
      replace:
        - from-repo: fedora
          packages:
            - old: OpenCL-ICD-Loader
              new: ocl-icd

      remove:
        packages:
         # example: removing firefox (in favor of the flatpak)
         # "firefox" is the main package, "firefox-langpacks" is a dependency
          - firefox
          - firefox-langpacks

    - from-file: common/proprietary-modules.yml

    - type: script
      scripts:
        - installrpmfusion.sh
        - removeunusedrepos.sh

    - type: files
      files:
        - source: system/usr
          destination: /usr
        - source: system/etc
          destination: /etc

    - type: gschema-overrides
      include:
        - zz1-wayblue-theming.gschema.override

    - type: script
      scripts:
        - addbrewjustimport.sh
        - install-lix.sh
        - install-lazyvim.sh
#        - enableniridms.sh

    - type: systemd
      user:
        enabled:
          - wayblue-update-verification.service
      system:
        enabled:
          - wayblue-rpm-ostreed-conf.service
          - nix-overlay.service
          - nix-daemon.service
          - nix-daemon.socket
          - niri.service
          - dms.service

    - type: wayblue-signing
      source: local
