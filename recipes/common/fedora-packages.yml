modules:
    - type: dnf
      install:
        install-weak-deps: false
        packages:
        # launcher
          - rofi-wayland
          - wofi
          - zsh
          - openssl
          - openssh
          - 7zip
          - toolbox
          - podman
          - rsync

        # environment
          - fzf
          - tuned-ppd
          - xorg-x11-server-Xwayland
          - headsetcontrol
          - mediainfo
          - polkit
          - xfce-polkit 
          - fprintd-pam
          - xdg-user-dirs
          - dbus-tools
          - dbus-daemon
          - wl-clipboard
          - pavucontrol
          - playerctl
          - qt5-qtwayland
          - qt6-qtwayland
          - vulkan-validation-layers
          - vulkan-tools
          - google-noto-emoji-fonts
          - gnome-disk-utility
          - ddcutil
          - openssl
          - neovim
          - tmux
          - just
          - alsa-firmware
          - p7zip
          - distrobox
          - steam-devices
          - dgop
          - cliphist
          
        # sound
          - wireplumber
          - pipewire
          - pamixer
          - pulseaudio-utils
          - qt6-qtmultimedia

        # networking
          - network-manager-applet
          - NetworkManager-openvpn
          - NetworkManager-openvpn-gnome
          - NetworkManager-openconnect
          - NetworkManager-openconnect-gnome
          - bluez
          - bluez-tools
          - blueman
          - firewall-config

        # file manager
          - thunar
          - thunar-archive-plugin 
          - thunar-volman
          - xarchiver
          - imv
          - p7zip
          - gvfs-mtp
          - gvfs-gphoto2
          - gvfs-smb
          - gvfs-nfs
          - gvfs-fuse
          - gvfs-archive
          - android-tools

        # screenshot
          - slurp
          - grim

        # display
          - wlr-randr
          - wlsunset
          - brightnessctl
          - kanshi
          - quickshell-git
          - cava
          - matugen

        # notifications
          - dunst

        # theme and GUI
          - fontawesome-fonts-all
          - gnome-themes-extra
          - gnome-icon-theme
          - paper-icon-theme
          - breeze-icon-theme 
          - papirus-icon-theme
      
      replace:
        - from-repo: fedora
          packages:
            - old: OpenCL-ICD-Loader
              new: ocl-icd

      remove:
        packages:
         # example: removing firefox (in favor of the flatpak)
         # "firefox" is the main package, "firefox-langpacks" is a dependency
          - firefox
          - firefox-langpacks
