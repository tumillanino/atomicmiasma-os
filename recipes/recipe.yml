---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: atomicmiasma-os
# description will be included in the image's metadata
description: This is my personal OS image testing with various features and modules from ghcr.io/randogoth/deinonyxus and ghcr.io/secureblue/secureblue.

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/ublue-os/base-main
image-version: latest # latest is also supported if you want new updates ASAP

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /


      
  - type: dnf
    install:
      packages:
        - niri
        - zsh
        - fedora-chromium-config-kde
        - fedora-flathub-remote
#        - fuse-encfs
#        - krfb
#        - krfb-libs
#        - fedora-workstation-repositories
#        - fedora-third-party
        - neovim
        - tmux
        - alacritty
#        - dnsconfd-unbound
      
        - openssl
        - openssh
#        - patch
#        - 7zip-standalone-all
        - 7zip
        - distrobox
        - toolbox
        - podman
#        - nvme-cli
#        - hdparm
#        - wireguard-tools
#        - gettext
        - rsync
#        - steam-devices
    
          # signing deps
#        - sbsigntools
      
      
          # For use in unprivileged ujust scripts
#        - python3-inquirer
      
          # provenance deps
#        - krunner-bazaar
    remove:
      packages:
        # example: removing firefox (in favor of the flatpak)
        # "firefox" is the main package, "firefox-langpacks" is a dependency
        - firefox
        - firefox-langpacks

  - type: dnf
    repos:
      copr:
        - wojnilowicz/ungoogled-chromium 
        - avengemedia/dms-git
        - secureblue/hardened_malloc
        - secureblue/no_rlimit_as
        - secureblue/selinux-policy
        - secureblue/crane
        - secureblue/run0edit
        - avengemedia/danklinux

    install:
      packages:
        - ungoogled-chromium
        - dms
        - dms-greeter
        - hardened_malloc
       # address hardened_malloc incompatibilities
        - no_rlimit_as
        - selinux-policy
        - crane
        - run0edit
        - danksearch
        - ghostty
        - matugen
        - dgop
        
  - type: script
    scripts:
      - install-lix.sh
      - install-lazyvim.sh
#      - update-shell.sh

  - type: systemd
    system:
      enabled:
        - nix-overlay.service
        - nix-daemon.service
        - nix-daemon.socket
        - niri.service
        - dms.service
